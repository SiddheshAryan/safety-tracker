<!DOCTYPE html>
<html>

<head>

<title>Set Password</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(120deg,#c8f7dc,#cbe8ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    color:#006666;
}

input{
    width:100%;
    padding:10px;
    margin-top:15px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#4fa3ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2 id="welcome"></h2>

<input type="password" id="password" placeholder="Set Password">

<button onclick="finish()">Register</button>

</div>

<script>

let name = localStorage.getItem("regName")

document.getElementById("welcome").innerText = "Hello "+name

function finish(){

let password = document.getElementById("password").value

localStorage.setItem("password",password)

alert("Registration Successful")

window.location.href="home.html"

}

</script>

</body>

</html>
