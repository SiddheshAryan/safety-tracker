<!DOCTYPE html>
<html>

<head>

<title>Register - Safety Tracker</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(120deg,#c8f7dc,#cbe8ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

.cards{
    display:flex;
    gap:30px;
    margin-top:30px;
}

.card{

    background:white;
    padding:40px;
    border-radius:12px;
    width:180px;
    cursor:pointer;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

.card:hover{
    transform:scale(1.05);
}

h1{
    color:#006666;
}

</style>

</head>

<body>

<div class="container">

<h1>Select Role</h1>

<div class="cards">

<div class="card" onclick="selectRole('student')">
🎓
<h3>Student</h3>
</div>

<div class="card" onclick="selectRole('parent')">
👨‍👩‍👧
<h3>Parent</h3>
</div>

<div class="card" onclick="selectRole('faculty')">
👩‍🏫
<h3>Faculty</h3>
</div>

</div>

</div>

<script>

function selectRole(role){

localStorage.setItem("role",role)

window.location.href="registerForm.html"

}

</script>

</body>

</html>
