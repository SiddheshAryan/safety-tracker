<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background: linear-gradient(120deg,#c8f7dc,#cbe8ff);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
        }

        .cards{
            display:flex;
            gap:30px;
            margin-top:30px;
            justify-content:center;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:12px;
            width:180px;
            cursor:pointer;
            box-shadow:0px 5px 15px rgba(0,0,0,0.2);
        }

        .card:hover{
            transform:scale(1.05);
        }

        .form{
            margin-top:30px;
        }

        input{
            width:250px;
            padding:10px;
            margin-top:10px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            padding:10px 20px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:#4fa3ff;
            color:white;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Login</h1>

    <div class="cards">

        <div class="card" onclick="selectRole('student')">
            🎓
            <h3>Student</h3>
        </div>

        <div class="card" onclick="selectRole('parent')">
            👨‍👩‍👧
            <h3>Parent</h3>
        </div>

        <div class="card" onclick="selectRole('faculty')">
            👩‍🏫
            <h3>Faculty</h3>
        </div>

    </div>

    <div class="form" id="loginForm"></div>

</div>

<script>

let role = "";

function selectRole(r){
    role = r;

    document.getElementById("loginForm").innerHTML = `
        <input id="name" placeholder="Enter Name"><br>
        <input type="password" id="password" placeholder="Enter Password"><br>
        <button onclick="login()">Login</button>
    `;
}

function login(){
    let name = document.getElementById("name").value;
    let password = document.getElementById("password").value;

    let savedName = localStorage.getItem("regName");
    let savedPass = localStorage.getItem("password");

    if(name === savedName && password === savedPass){

        alert("Login Successful");

        if(role === "student"){
            window.location.href = "studentDashboard.html";
        }
        else if(role === "parent"){
            window.location.href = "parentDashboard.html";
        }
        else if(role === "faculty"){
            window.location.href = "facultyDashboard.html";
        }
        else{
            alert("Please select a role");
        }

    } else {
        alert("Login Unsuccessful");
    }
}

</script>

</body>
</html>
