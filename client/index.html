<!DOCTYPE html>
<html>

<head>
    <title>Safety Tracker</title>
    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(120deg,#c8f7dc,#cbe8ff);
        }

        .container{
            text-align:center;
            background:white;
            padding:50px;
            border-radius:12px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
            width:420px;
        }

        h1{
            color:#006666;
            font-size:40px;
            margin-bottom:10px;
        }

        p{
            color:#555;
            margin-bottom:30px;
            line-height:1.5;
        }

        button{
            padding:12px 30px;
            font-size:18px;
            margin:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#4fa3ff;
            color:white;
        }

        button:hover{
            background:#2e86de;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Safety Tracker</h1>

        <p>
            A smart system that allows parents and faculty to track
            student safety and location in real time.
        </p>

        <button onclick="goLogin()">Login</button>
        <button onclick="goRegister()">Register</button>
    </div>

    <script>
        function goLogin(){
            window.location.href = "login.html";
        }

        function goRegister(){
            window.location.href = "register.html";
        }
    </script>
</body>

</html>
