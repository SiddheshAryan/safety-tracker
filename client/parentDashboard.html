<!DOCTYPE html>
<html>

<head>

<title>Parent Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

.header{
background:#4fa3ff;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.controls{
padding:10px;
background:#f2f2f2;
}

#map{
height:80vh;
}

input{
padding:8px;
}

button{
padding:8px 15px;
margin-left:10px;
}

</style>

</head>

<body>

<div class="header">
<div>Parent Dashboard</div>
<button onclick="logout()">Logout</button>
</div>

<div class="controls">
Enter Child Roll Number:
<input type="text" id="roll">
<button onclick="track()">Track Child</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const socket = io();

let map = L.map('map').setView([20.5937,78.9629],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


/* Marker Icons */

const redIcon = new L.Icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41],
popupAnchor:[1,-34],
shadowSize:[41,41]
});

const blueIcon = new L.Icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png",
shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41],
popupAnchor:[1,-34],
shadowSize:[41,41]
});

const greenIcon = new L.Icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
shadowUrl:"https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41],
popupAnchor:[1,-34],
shadowSize:[41,41]
});


let startMarker = null;
let currentMarker = null;
let stopMarker = null;
let pathLine = null;

let trackedRoll = "";


/* Track Student */

function track(){

trackedRoll = document.getElementById("roll").value.trim();

if(!trackedRoll){
alert("Enter roll number");
return;
}

socket.emit("trackStudent", trackedRoll);

}


/* Receive Location */

socket.on("receiveLocation",(data)=>{

if(trackedRoll && data.roll !== trackedRoll) return;


/* START LOCATION */

if(data.start){

if(startMarker) map.removeLayer(startMarker);

startMarker = L.marker(
[data.start.lat,data.start.lon],
{icon:redIcon}
).addTo(map).bindPopup("Start Location");

}


/* CURRENT LOCATION */

if(data.current){

if(currentMarker) map.removeLayer(currentMarker);

currentMarker = L.marker(
[data.current.lat,data.current.lon],
{icon:blueIcon}
).addTo(map).bindPopup("Current Location");

map.setView([data.current.lat,data.current.lon],16);

}


/* STOP LOCATION */

if(data.stop){

if(stopMarker) map.removeLayer(stopMarker);

stopMarker = L.marker(
[data.stop.lat,data.stop.lon],
{icon:greenIcon}
).addTo(map).bindPopup("Stop Location");

}


/* PATH LINE */

if(data.path && data.path.length>1){

if(pathLine) map.removeLayer(pathLine);

pathLine = L.polyline(data.path).addTo(map);

}

});


socket.on("locationError",(data)=>{
alert(data.message);
});


function logout(){
window.location.href="index.html";
}

</script>

</body>
</html>
